<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Owner Sign Up</title>
<link rel="stylesheet" href="assets/css/styles.css">
<script defer src="assets/js/demo-app.js"></script>
<script defer src="assets/js/auth-pages.js"></script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card card stack">
    <div class="kicker">Owner Sign Up</div>
    <h1 style="margin:0;font-size:48px">Create your MenuFlow account</h1>
    <form id="signupForm" class="stack">
      <input name="fullName" placeholder="Full name">
      <input name="email" placeholder="Email">
      <input name="password" type="password" placeholder="Password">
      <input name="businessName" placeholder="Business name">
      <input name="slug" placeholder="Business slug">
      <button class="btn" type="submit">Create Account</button>
      <div id="msg" class="muted"></div>
    </form>
  </div>
</div>
</body>
</html>
