<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Owner Login</title>
<link rel="stylesheet" href="assets/css/styles.css">
<script defer src="assets/js/demo-app.js"></script>
<script defer src="assets/js/auth-pages.js"></script>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card card stack">
    <div class="kicker">Owner Login</div>
    <h1 style="margin:0;font-size:48px">Login to MenuFlow</h1>
    <form id="loginForm" class="stack">
      <input name="email" value="owner@demo.com" placeholder="Email">
      <input name="password" value="password123" type="password" placeholder="Password">
      <button class="btn" type="submit">Login</button>
      <div id="msg" class="muted"></div>
    </form>
  </div>
</div>
</body>
</html>
